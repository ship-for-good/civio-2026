[project]
name = "data"
version = "0.1.0"
description = "Minimal data stack for Civio hackathon experiments"
requires-python = ">=3.12"
dependencies = [
    "psycopg[binary]",
    "polars",
    "duckdb",
    "httpx",
    "selectolax",
    "tenacity",
    "typer",
]

[project.optional-dependencies]
test = [
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
