[project]
name = "mcp-transparencia"
version = "0.1.0"
description = "Postgres ETL and MCP tools for the Transparencia corpus"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.2",
    "polars",
    "psycopg[binary]",
    "typer",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["etl"]
