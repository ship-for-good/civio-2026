# Production stack for the EC2 deploy.
# All services run together (no RDS / no managed S3): Postgres + MinIO as containers.
# The app image is pulled from DockerHub (public). Values come from the .env file
# generated by the GitHub Actions deploy job.
services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sqlete
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:-docker.io/dieg666/sqlete:latest}
    # Run migrations on every boot, then start the server.
    command: sh -c "/app/bin/migrate && /app/bin/server"
    environment:
      PHX_SERVER: "true"
      PORT: "4000"
      URL_SCHEME: "http"
      URL_PORT: "80"
      PHX_HOST: ${PHX_HOST}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: "ecto://postgres:postgres@db:5432/sqlete"
      MINIO_HOST: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      STORAGE_BUCKET: "sqlete-pdfs"
      # OpenAI API key for embeddings and LLM (required for AI features).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      # Deadline alerts (Twilio SMS/voice). Leave ALERTS_PROVIDER empty to disable.
      ALERTS_PROVIDER: ${ALERTS_PROVIDER:-}
      ALERTS_CHANNEL: ${ALERTS_CHANNEL:-sms}
      ALERTS_THRESHOLD_DAYS: ${ALERTS_THRESHOLD_DAYS:-5}
      ALERT_TO_NUMBER: ${ALERT_TO_NUMBER:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "80:4000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
