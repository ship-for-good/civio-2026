# Persistent named volumes cannot enforce a max disk size on Docker Desktop (Windows/macOS).
# Use one of:
#   - DATASTORE_VOLUME=./data in .env (bind mount; monitor folder size on the host)
#   - SCREENSHOT_MAX_HEIGHT + history limits in the UI (reduce growth)
#   - docker compose -f docker-compose.yml -f docker-compose.ephemeral.yml up -d
#     (tmpfs hard cap; all data is lost on `docker compose down -v`)
services:
  changedetection-init:
    image: node:20-alpine
    container_name: changedetection-init
    volumes:
      - ${DATASTORE_VOLUME:-changedetection-data}:/datastore
      - ./scripts/init-datastore.js:/init.js:ro
    environment:
      - CHANGEDETECTION_API_KEY=${CHANGEDETECTION_API_KEY:-civio-monitor-dev}
    command: ["node", "/init.js"]
    restart: "no"

  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io
    container_name: changedetection
    hostname: changedetection
    volumes:
      - ${DATASTORE_VOLUME:-changedetection-data}:/datastore
    environment:
      - PLAYWRIGHT_DRIVER_URL=ws://browser-sockpuppet-chrome:3000
      - BASE_URL=${BASE_URL:-http://127.0.0.1:5000}
      - TZ=${TZ:-Europe/Madrid}
      - SCREENSHOT_MAX_HEIGHT=${SCREENSHOT_MAX_HEIGHT:-8000}
      # Allow watches on private/LAN URLs (e.g. 10.x, 192.168.x). SSRF risk if exposed publicly.
      - ALLOW_IANA_RESTRICTED_ADDRESSES=${ALLOW_IANA_RESTRICTED_ADDRESSES:-false}
    ports:
      - "${CHANGEDETECTION_PORT:-127.0.0.1:5000}:5000"
    restart: unless-stopped
    depends_on:
      changedetection-init:
        condition: service_completed_successfully
      browser-sockpuppet-chrome:
        condition: service_started

  config-panel:
    build: ./panel
    container_name: config-panel
    ports:
      - "${CONFIG_PANEL_PORT:-127.0.0.1:3000}:3000"
    environment:
      - CHANGEDETECTION_URL=http://changedetection:5000
      - CHANGEDETECTION_API_KEY=${CHANGEDETECTION_API_KEY:-civio-monitor-dev}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - NOTIFICATION_EMAIL_FROM=${NOTIFICATION_EMAIL_FROM:-}
      - DEFAULT_CHECK_MINUTES=${DEFAULT_CHECK_MINUTES:-30}
    volumes:
      - ./panel/data:/app/data
    depends_on:
      changedetection:
        condition: service_started
    restart: unless-stopped

  browser-sockpuppet-chrome:
    image: dgtlmoon/sockpuppetbrowser:latest
    container_name: browser-sockpuppet-chrome
    hostname: browser-sockpuppet-chrome
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - SCREEN_DEPTH=16
      - MAX_CONCURRENT_CHROME_PROCESSES=10

volumes:
  changedetection-data:
    # Only used when DATASTORE_VOLUME is not set to a host path (e.g. ./data)
