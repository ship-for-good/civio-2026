name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./sqlete
          push: true
          tags: |
            docker.io/${{ vars.DOCKERHUB_USER }}/sqlete:latest
            docker.io/${{ vars.DOCKERHUB_USER }}/sqlete:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: sqlete/docker-compose.prod.yml
          target: /home/${{ vars.EC2_USER }}/app
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            mv -f docker-compose.prod.yml docker-compose.yml
            cat > .env <<EOF
            PHX_HOST=${{ vars.EC2_HOST }}
            SECRET_KEY_BASE=${{ secrets.SECRET_KEY_BASE }}
            APP_IMAGE=docker.io/${{ vars.DOCKERHUB_USER }}/sqlete:latest
            MINIO_ACCESS_KEY=minio
            MINIO_SECRET_KEY=minio123
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            AI_PROVIDER=openai
            ALERTS_PROVIDER=${{ vars.ALERTS_PROVIDER }}
            ALERTS_CHANNEL=${{ vars.ALERTS_CHANNEL }}
            ALERT_TO_NUMBER=${{ secrets.ALERT_TO_NUMBER }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
            EOF
            docker compose --env-file .env pull
            docker compose --env-file .env up -d
            docker image prune -f
