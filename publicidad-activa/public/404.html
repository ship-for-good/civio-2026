<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Página no encontrada — Publicidad Activa</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fafaf9;
        color: #1c1917;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 28rem;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 0.5rem;
        background: #0284c7;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
      }
      .code {
        font-size: 4.5rem;
        font-weight: 700;
        color: #e7e5e4;
        line-height: 1;
      }
      h1 {
        margin-top: 1rem;
        font-size: 1.5rem;
        font-weight: 700;
      }
      p {
        margin-top: 1rem;
        color: #57534e;
      }
      a {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.625rem 1.25rem;
        border-radius: 0.75rem;
        background: #0284c7;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
      }
      a:hover { background: #0369a1; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">PA</div>
      <p class="code" aria-hidden="true">404</p>
      <h1>Página no encontrada</h1>
      <p>La dirección no existe o el contenido ya no está disponible.</p>
      <a href="/">Ir al inicio</a>
    </main>
  </body>
</html>
