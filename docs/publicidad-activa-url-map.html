<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa URLs — Publicitat activa</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #fafbfc;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-muted: #5c6573;
      --text-faint: #8b939e;
      --accent: #1a56db;
      --accent-soft: #ebf2ff;
      --accent-hover: #1648b8;
      --highlight: #fef3c7;
      --match: #fde68a;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono: ui-monospace, "Cascadia Code", "SF Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }
    .sidebar h2 {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-faint);
      margin-bottom: .75rem;
    }
    .main {
      padding: 1.5rem 2rem 3rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 0;
    }
    header h1 {
      font-size: 1.35rem;
      font-weight: 650;
      letter-spacing: -.02em;
    }
    header .subtitle {
      color: var(--text-muted);
      font-size: .875rem;
      margin-top: .25rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: .75rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .875rem 1rem;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.03em;
      color: var(--accent);
    }
    .stat-label {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: .125rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1rem;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: .5rem .75rem .5rem 2.25rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--accent); }
    .btn {
      padding: .5rem .875rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      font-size: .8125rem;
      font-family: var(--font);
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--bg); border-color: #cdd2da; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .materia-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .materia-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: .5rem .625rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      font-family: var(--font);
      font-size: .8125rem;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      transition: background .12s;
    }
    .materia-btn:hover { background: var(--bg); }
    .materia-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }
    .materia-btn .count {
      font-size: .7rem;
      color: var(--text-faint);
      background: var(--bg);
      padding: .1rem .4rem;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }
    .materia-btn.active .count {
      background: rgba(26,86,219,.15);
      color: var(--accent);
    }
    .tree-panel {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      min-height: 400px;
      max-height: calc(100vh - 280px);
    }
    .tree-root { padding: .5rem 0; }
    .tree-node { user-select: none; }
    .tree-row {
      display: flex;
      align-items: center;
      gap: .25rem;
      padding: .2rem .75rem .2rem 0;
      cursor: pointer;
      border-radius: 4px;
      margin: 0 .5rem;
      font-size: .8125rem;
    }
    .tree-row:hover { background: var(--bg); }
    .tree-row.match { background: var(--match); }
    .tree-row.focused { outline: 2px solid var(--accent); outline-offset: -2px; }
    .chevron {
      width: 1.25rem;
      height: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-faint);
      transition: transform .15s;
      border-radius: 3px;
    }
    .chevron:hover { background: var(--border); color: var(--text); }
    .chevron.open { transform: rotate(90deg); }
    .chevron.leaf { visibility: hidden; }
    .node-name {
      font-family: var(--mono);
      font-size: .78rem;
      word-break: break-all;
    }
    .node-count {
      margin-left: auto;
      font-size: .7rem;
      color: var(--text-faint);
      background: var(--bg);
      padding: .05rem .4rem;
      border-radius: 8px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .tree-children { display: none; }
    .tree-children.open { display: block; }
    .path-row {
      display: flex;
      gap: .5rem;
      align-items: stretch;
    }
    .path-bar {
      flex: 1;
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem .875rem;
      word-break: break-all;
      min-height: 2rem;
      display: flex;
      align-items: center;
    }
    .path-bar.empty { color: var(--text-faint); font-family: var(--font); font-style: italic; }
    .path-bar a { color: var(--accent); text-decoration: none; }
    .path-bar a:hover { text-decoration: underline; }
    #btn-copy { align-self: center; }
    #btn-copy.copied { background: #ecfdf5; border-color: #6ee7b7; color: #047857; }
    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
    }
    .legend {
      font-size: .75rem;
      color: var(--text-faint);
      margin-top: 1rem;
      line-height: 1.6;
    }
    .search-meta {
      font-size: .75rem;
      color: var(--text-muted);
      padding: 0 .25rem;
    }
  </style>
</head>

      const focused = state.focusedPath === pathKey(segs);
      const indent = depth * 1.1;

      let html = `<div class="tree-node" data-path="${pathKey(segs)}">`;
      if (node.name) {
        html += `<div class="tree-row${isMatch ? " match" : ""}${focused ? " focused" : ""}" style="padding-left:${indent + 0.75}rem" data-path="${pathKey(segs)}">`;
        html += `<span class="chevron ${hasChildren ? (expanded ? "open" : "") : "leaf"}" data-action="toggle" data-path="${pathKey(segs)}">▶</span>`;
        html += `<span class="node-name">${escapeHtml(node.name)}</span>`;
        if (node.count > 1) html += `<span class="node-count">${node.count}</span>`;
        html += `</div>`;
      }
      if (hasChildren) {
        html += `<div class="tree-children${expanded ? " open" : ""}">`;
        html += node.children.map(c => renderNode(c, segs, depth + (node.name ? 1 : 0))).join("");
        html += `</div>`;
      }
      html += `</div>`;
      return html;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function renderTree() {
      const root = document.getElementById("tree-root");
      const html = renderNode(DATA.tree, [], 0);
      root.innerHTML = html || `<div class="empty-state">Cap resultat per a la cerca.</div>`;
      const q = state.filter.trim();
      const meta = document.getElementById("search-meta");
      if (q) {
        const matches = root.querySelectorAll(".match").length;
        meta.textContent = matches ? `${matches} coincidència${matches > 1 ? "s" : ""}` : "Sense coincidències";
      } else meta.textContent = "";
    }

    function autoExpandForFilter() {
      state.expanded.clear();
      const q = state.filter.trim().toLowerCase();
      if (!q && !state.materia) return;

      function walk(node, segments) {
        const segs = node.name ? [...segments, node.name] : segments;
        let expand = false;
        if (node.name && q && node.name.toLowerCase().includes(q)) expand = true;
        if (state.materia && segs.includes(state.materia)) expand = true;
        (node.children || []).forEach(c => {
          if (walk(c, segs)) expand = true;
        });
        if (expand && node.name) setExpanded(segs, true);
        return expand;
      }
      walk(DATA.tree, []);
    }

    function expandAll() {
      function walk(node, segments) {
        const segs = node.name ? [...segments, node.name] : segments;
        if (node.name && node.children && node.children.length) setExpanded(segs, true);
        (node.children || []).forEach(c => walk(c, segs));
      }
      walk(DATA.tree, []);
      renderTree();
    }

    function collapseAll() {
      state.expanded.clear();
      function walk(node, segments) {
        const segs = node.name ? [...segments, node.name] : segments;
        if (node.name) setExpanded(segs, false);
        (node.children || []).forEach(c => walk(c, segs));
      }
      walk(DATA.tree, []);
      renderTree();
    }

    let currentUrl = "";

    function showPath(segments) {
      const bar = document.getElementById("path-bar");
      const btn = document.getElementById("btn-copy");
      currentUrl = "https://transparencia.gob.es/" + segments.join("/");
      bar.innerHTML = `<a href="${currentUrl}" target="_blank" rel="noopener">${escapeHtml(currentUrl)}</a>`;
      bar.classList.remove("empty");
      btn.disabled = false;
      btn.classList.remove("copied");
      btn.textContent = "Copiar URL";
    }

    document.getElementById("btn-copy").addEventListener("click", async () => {
      if (!currentUrl) return;
      try {
        await navigator.clipboard.writeText(currentUrl);
        const btn = document.getElementById("btn-copy");
        btn.textContent = "Copiat!";
        btn.classList.add("copied");
      } catch (_) {
        prompt("Copia la URL:", currentUrl);
      }
    });

    document.getElementById("tree-root").addEventListener("click", e => {
      const row = e.target.closest(".tree-row");
      const chevron = e.target.closest("[data-action=toggle]");
      const path = (chevron || row)?.dataset?.path;
      if (!path) return;
      const segments = path.split("/");

      if (chevron) {
        e.stopPropagation();
        const node = findNode(segments);
        if (node && node.children && node.children.length) {
          setExpanded(segments, !isExpanded(segments));
          renderTree();
        }
      }
      if (row) {
        state.focusedPath = path;
        showPath(segments);
        renderTree();
      }
    });

    function findNode(segments) {
      let node = DATA.tree;
      for (const seg of segments) {
        if (!node.children) return null;
        node = node.children.find(c => c.name === seg);
        if (!node) return null;
      }
      return node;
    }

    let searchTimer;
    document.getElementById("search").addEventListener("input", e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.filter = e.target.value;
        autoExpandForFilter();
        renderTree();
      }, 200);
    });

    document.getElementById("btn-expand").addEventListener("click", expandAll);
    document.getElementById("btn-collapse").addEventListener("click", collapseAll);
    document.getElementById("btn-reset").addEventListener("click", () => {
      state.filter = "";
      state.materia = null;
      state.expanded.clear();
      state.focusedPath = null;
      document.getElementById("search").value = "";
      document.querySelectorAll(".materia-btn").forEach((b, i) => {
        b.classList.toggle("active", i === 0);
      });
      currentUrl = "";
      document.getElementById("path-bar").textContent = "Clic a un node per veure el path complet";
      document.getElementById("path-bar").classList.add("empty");
      document.getElementById("btn-copy").disabled = true;
      document.getElementById("btn-copy").classList.remove("copied");
      document.getElementById("btn-copy").textContent = "Copiar URL";
      renderTree();
    });

    document.addEventListener("keydown", e => {
      if (e.key === "/" && document.activeElement !== document.getElementById("search")) {
        e.preventDefault();
        document.getElementById("search").focus();
      }
    });

    renderStats();
    renderMaterias();
    renderTree();
  </script>
</body>
</html>
